server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      default-filters:
        - name: JwtAuthFilter
      routes:
        # --- Standard Service Routes ---
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: authCircuitBreaker
                fallbackUri: forward:/fallback/auth
        
        - id: catalog-service
          uri: lb://catalog-service
          predicates:
            - Path=/api/catalog/**
          filters:
            - name: CircuitBreaker
              args:
                name: catalogCircuitBreaker
                fallbackUri: forward:/fallback/catalog

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - name: CircuitBreaker
              args:
                name: orderCircuitBreaker
                fallbackUri: forward:/fallback/orders

        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**
          filters:
            - name: CircuitBreaker
              args:
                name: adminCircuitBreaker
                fallbackUri: forward:/fallback/admin

        # --- SWAGGER AGGREGATION ROUTES ---
        # These routes allow the Gateway to pull JSON docs from each service
        - id: auth-docs
          uri: lb://auth-service
          predicates:
            - Path=/v3/api-docs/auth-service/**
          filters:
            - RewritePath=/v3/api-docs/auth-service(?<segment>.*), /v3/api-docs$\{segment}

        - id: catalog-docs
          uri: lb://catalog-service
          predicates:
            - Path=/v3/api-docs/catalog-service/**
          filters:
            - RewritePath=/v3/api-docs/catalog-service(?<segment>.*), /v3/api-docs$\{segment}

        - id: order-docs
          uri: lb://order-service
          predicates:
            - Path=/v3/api-docs/order-service/**
          filters:
            - RewritePath=/v3/api-docs/order-service(?<segment>.*), /v3/api-docs$\{segment}

        - id: admin-docs
          uri: lb://admin-service
          predicates:
            - Path=/v3/api-docs/admin-service/**
          filters:
            - RewritePath=/v3/api-docs/admin-service(?<segment>.*), /v3/api-docs$\{segment}

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

# ── Swagger Aggregator Configuration ──────────────────────────────────────────
springdoc:
  swagger-ui:
    # This creates the dropdown menu in the Gateway Swagger UI
    urls:
      - name: "1. Auth Service"
        url: /v3/api-docs/auth-service
      - name: "2. Catalog Service"
        url: /v3/api-docs/catalog-service
      - name: "3. Order Service"
        url: /v3/api-docs/order-service
      - name: "4. Admin Service"
        url: /v3/api-docs/admin-service

# ── Monitoring & Actuator ─────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,tracing,gateway,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
    gateway:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:zipkin}:9411/api/v2/spans

# ── Service Discovery ─────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:eureka-server}:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# ── Security ──────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:your_very_long_and_secure_secret_key_here}

# ── Resilience ────────────────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.pharmacy.gateway: DEBUG
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
