server:
  port: 8083

spring:
  application:
    name: order-service
  datasource:
    # Use variables for the DB connection
    url: jdbc:mysql://${DB_HOST:localhost}:3306/pharmacy_orders?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# ── Eureka Discovery Configuration ────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# ── Monitoring & Tracing (Actuator & Zipkin) ──────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,tracing,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans

# ── Security & Feign Configuration ───────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}

feign:
  circuitbreaker:
    enabled: true
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 5000
        loggerLevel: BASIC

# ── API Documentation ────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Logging Section ──────────────────────────────────────────────────────────
logging:
  level:
    com.onlinePharmacy.order: DEBUG
    org.springframework.web: DEBUG
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"